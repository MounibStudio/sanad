{% extends "core/base.html" %}
{% block title %}سناد — اسأل سؤالك{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto mt-10">

  <!-- Titre -->
  <h1 class="text-3xl font-bold text-amber-700 mb-6 text-center">
    🤲 سناد — اسأل سؤالك
  </h1>

  <!-- Message erreur -->
  {% if erreur %}
  <div class="bg-red-100 text-red-700 p-3 rounded mb-4 text-center">
    {{ erreur }}
  </div>
  {% endif %}

  <!-- Formulaire -->
  <form method="GET" action="{% url 'knowledge:reponse' %}">
    <div class="mb-4">
      <label class="block text-gray-700 text-lg mb-2">
        كتب سؤالك بالدارجة
      </label>
      <input
        type="text"
        name="question"
        placeholder="مثال: كيف ندير CIN ديالي؟"
        class="w-full border-2 border-amber-400 rounded-lg p-4 text-xl text-right"
        dir="rtl"
      />
    </div>
    <button
      type="submit"
      class="w-full bg-amber-600 text-white text-xl font-bold py-4 rounded-lg hover:bg-amber-700"
    >
      🔍 ابحث
    </button>
  </form>

  <!-- Retour accueil -->
  <a href="{% url 'core:home' %}" class="block text-center mt-6 text-green-700 underline">
    ← الرجوع للرئيسية
  </a>

</div>
{% endblock %}
