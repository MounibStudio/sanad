<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}سند{% endblock %}</title>

  <!-- Tailwind CSS via CDN (prototype only) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            arabic: ['Noto Naskh Arabic', 'Amiri', 'serif'],
          },
        },
      },
    }
  </script>

  <!-- Google Fonts – Arabic typeface -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;700&display=swap"
    rel="stylesheet"
  />

  <style>
    body { font-family: 'Noto Naskh Arabic', serif; }
  </style>

  {% block extra_head %}{% endblock %}
</head>

<body class="min-h-screen bg-amber-50 text-gray-900 text-xl leading-relaxed">

  <!-- ── Header ── -->
  <header class="bg-green-800 text-white py-4 px-6 flex items-center justify-between shadow-md">
    <a href="{% url 'core:home' %}" class="text-3xl font-bold tracking-wide">سَنَد</a>
    <span class="text-sm opacity-75">مساعدك القانوني بالدارجة</span>
  </header>

  <!-- ── Main content ── -->
  <main class="max-w-2xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

  <!-- ── Footer ── -->
  <footer class="text-center text-gray-500 text-base py-6 border-t border-gray-200 mt-8">
    مشروع أكاديمي – EMSI الدار البيضاء &nbsp;|&nbsp; 2025
  </footer>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
