{% extends "core/base.html" %}

{% block title %}سند – الرئيسية{% endblock %}

{% block content %}
<div class="text-center mb-8">
  <h1 class="text-4xl font-bold text-green-800 mb-2">أهلاً بك في سَنَد</h1>
  <p class="text-gray-600 text-lg">اختر ما تريد:</p>
</div>

<!-- Big pictogram buttons -->
<div class="grid grid-cols-1 gap-6 sm:grid-cols-2">

  <!-- Button 1: Ask a question by voice -->
  <a
    href="{% url 'voice:index' %}"
    class="flex flex-col items-center justify-center gap-4
           bg-green-700 hover:bg-green-600 active:bg-green-800
           text-white rounded-3xl p-8 shadow-lg
           transition-colors duration-150 focus:outline-none
           focus:ring-4 focus:ring-green-400"
    role="button"
    aria-label="اسأل سؤالاً بصوتك"
  >
    <!-- Microphone pictogram -->
    <svg xmlns="http://www.w3.org/2000/svg" class="w-20 h-20" fill="none"
         viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"
         aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 18.75a6 6 0 0 0 6-6v-1.5m-6 7.5a6 6 0 0 1-6-6v-1.5
               m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 0 1-3-3V4.5a3 3
               0 1 1 6 0v8.25a3 3 0 0 1-3 3Z" />
    </svg>
    <span class="text-2xl font-bold">اسأل سؤال</span>
    <span class="text-sm opacity-80">بصوتك بالدارجة</span>
  </a>

  <!-- Button 2: Browse FAQ / knowledge base -->
  <a
    href="{% url 'knowledge:index' %}"
    class="flex flex-col items-center justify-center gap-4
           bg-amber-600 hover:bg-amber-500 active:bg-amber-700
           text-white rounded-3xl p-8 shadow-lg
           transition-colors duration-150 focus:outline-none
           focus:ring-4 focus:ring-amber-400"
    role="button"
    aria-label="تصفح الأسئلة الشائعة"
  >
    <!-- Book / FAQ pictogram -->
    <svg xmlns="http://www.w3.org/2000/svg" class="w-20 h-20" fill="none"
         viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"
         aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987
               8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1
               6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967
               8.967 0 0 0-6 2.292m0-14.25v14.25" />
    </svg>
    <span class="text-2xl font-bold">تصفح الأسئلة</span>
    <span class="text-sm opacity-80">الوثائق والإجراءات</span>
  </a>

</div>
{% endblock %}
